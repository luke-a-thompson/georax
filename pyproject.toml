[project]
name = "georax"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "diffrax>=0.7.2",
    "diffrax-lowstorage>=0.1.0",
    "jax[cuda]>=0.9.1",
    "matplotlib>=3.10.8",
]

[tool.uv.sources]
diffrax-lowstorage = {git = "https://github.com/luke-a-thompson/diffrax-lowstorage.git"}

[project.optional-dependencies]
dev = [
    "pytest",
]

[tool.setuptools]
packages = ["georax"]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff]
line-length = 88
indent-width = 4

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
